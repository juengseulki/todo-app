<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phase 4 - complete</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <!--벚꽃 배경-->
    <div class="blossom-container"></div>
    <!--체크 완료 시 꽃 이펙트-->
    <div class="effect-container"></div>
    <div class="app">
      <div class="app-header">
        <h1>Todo 앱</h1>
        <p>할 일을 관리해보세요 🙂</p>
        <div class="summary">
          남은 할 일: <span id="remaining-count">0</span>개
        </div>

        <a href="../index.html" class="btn-home">🌷</a>
        <button id="dark-toggle">🌙</button>
      </div>

      <div class="mission-box">
        <strong>🎯 Phase 1 미션</strong>
        <label>
          <input type="checkbox" />
          app-title 텍스트를 "나만의 Todo 앱"으로 바꾸기
        </label>
        <label>
          <input type="checkbox" />
          app-subtitle 텍스트를 원하는 문구로 바꾸기
        </label>
        <label>
          <input type="checkbox" />
          remaining-count 숫자를 3으로 바꾸기
        </label>
        <label>
          <input type="checkbox" />
          콘솔에 todo-list 요소를 출력해보기
        </label>

        <strong>🎯 Phase 2 미션</strong>
        <label>
          <input type="checkbox" />
          addTodo() 함수: 입력값으로 li 항목을 만들어 목록에 추가하기
        </label>
        <label>
          <input type="checkbox" />
          createElement로 li, span, button 만들기
        </label>
        <label>
          <input type="checkbox" />
          span에 입력값 넣기
        </label>
        <label>
          <input type="checkbox" />
          li에 span, button 붙이기
        </label>
        <label>
          <input type="checkbox" />
          todo-list에 li 추가하기
        </label>
        <label>
          <input type="checkbox" />
          삭제 버튼 클릭 시 해당 li 삭제하기
        </label>
        <label>
          <input type="checkbox" />
          updateCount() 함수: 남은 항목 수 업데이트하기
        </label>

        <strong>🎯 Phase 3 미션</strong>
        <label>
          <input type="checkbox" />
          Enter 키를 눌러도 항목이 추가되도록 하기
        </label>
        <label>
          <input type="checkbox" />
          체크박스 클릭 시 li에 'done' 클래스 토글하기
        </label>
        <label>
          <input type="checkbox" />
          완료된 항목은 카운트에서 빼기
        </label>
      </div>

      <div class="input-area">
        <div class="input-row">
          <input
            type="text"
            id="todo-input"
            placeholder="할 일을 입력하세요 (Enter도 됩니다)"
          />
          <button class="btn-add" id="add-btn">추가</button>
          <button class="btn-clear" id="clear-btn">전체 삭제</button>
        </div>
      </div>

      <div class="status-box">
        <span>전체: <strong id="total-count">0</strong></span>
        <span>완료: <strong id="done-count">0</strong></span>
        <span>남은 할 일: <strong id="remaining-count-2">0</strong></span>
      </div>

      <div class="filter-box">
        <button data-filter="all" class="filter-btn active">🌸 All</button>
        <button data-filter="active" class="filter-btn">🌱 Active</button>
        <button data-filter="done" class="filter-btn">🌼 Done</button>
      </div>
      <ul class="todo-list" id="todo-list"></ul>
    </div>

    <button id="scroll-top">🌸</button>
  </body>
</html>
